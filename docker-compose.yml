version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hmis_postgres
    environment:
      POSTGRES_DB: hmis
      POSTGRES_USER: hmis_user
      POSTGRES_PASSWORD: hmis_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hmis_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: